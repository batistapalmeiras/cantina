packages:
  - "apps/*"
  - "packages/*"

catalog:
  # React
  react: ^19.2.7
  react-dom: ^19.2.7
  react-hook-form: ^7.80.0
  react-router-dom: ^7.18.0
  "@hookform/resolvers": ^5.4.0
  react-scripts: 5.0.1
  # Libs
  styled-components: ^6.4.3
  lucide-react: ^1.21.0
  zod: ^4.4.3
  # Build tooling
  # Pinned to 5.1.6: >=5.0 is required to parse zod v4 type defs (TS 4.9 could
  # not, breaking `tsc` entirely), while <5.2 stays within the range supported
  # by @typescript-eslint 5.62 (pinned transitively by CRA's eslint-config-react-app).
  # Bump further once the CRA/ESLint toolchain is upgraded (W5-2).
  typescript: 5.1.6
  tsup: ^8.3.0
  # Types
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@types/styled-components": ^5.1.36
  "@types/react-router-dom": ^5.3.3
  "@types/jest": ^27.5.2
  "@types/node": ^16.18.126
  # Testing
  "@testing-library/dom": ^10.4.1
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@testing-library/user-event": ^13.5.0
  web-vitals: ^2.1.4
  # ESLint
  eslint-plugin-react-hooks: ^4.6.2
